<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="assests/dogeshcalculator.ico.ico"
      <link
      rel="stylesheet"
      href="static/styles.css"
    />
  </head>
  <body>
    <div class="calculator-container">
      <h1 class="calculator-title">CALCULATOR</h1>
      <div class="display">
        <input
          type="text"
          class="display-input"
          id="display"
          placeholder=" "
          readonly
        />
        <div class="display-result" id="result"></div>
      </div>

      <div class="button-grid">
        <!-- Row 1 -->
        <button class="btn btn-clear" onclick="clearAll()">AC</button>
        <button class="btn btn-clear" onclick="clearEntry()">CE</button>
        <button class="btn btn-operator" onclick="appendToDisplay('**')">
          x^y
        </button>
        <button class="btn btn-function" onclick="appendFunction('sqrt(')">
          √
        </button>
        <button class="btn btn-operator" onclick="appendToDisplay('/')">
          /
        </button>

        <!-- Row 2 -->
        <button class="btn btn-function" onclick="appendFunction('sin(')">
          sin
        </button>
        <button class="btn btn-function" onclick="appendFunction('cos(')">
          cos
        </button>
        <button class="btn btn-function" onclick="appendFunction('tan(')">
          tan
        </button>
        <button class="btn btn-function" onclick="appendFunction('log10(')">
          log
        </button>
        <button class="btn btn-operator" onclick="appendToDisplay('*')">
          ×
        </button>

        <!-- Row 3 -->
        <button class="btn btn-function" onclick="appendFunction('asin(')">
          asin
        </button>
        <button class="btn btn-function" onclick="appendFunction('acos(')">
          acos
        </button>
        <button class="btn btn-function" onclick="appendFunction('atan(')">
          atan
        </button>
        <button class="btn btn-function" onclick="appendFunction('log(')">
          ln
        </button>
        <button class="btn btn-operator" onclick="appendToDisplay('-')">
          -
        </button>

        <!-- Row 4 -->
        <button class="btn" onclick="appendToDisplay('7')">7</button>
        <button class="btn" onclick="appendToDisplay('8')">8</button>
        <button class="btn" onclick="appendToDisplay('9')">9</button>
        <button class="btn btn-function" onclick="appendToDisplay('3.14159')">
          π
        </button>
        <button class="btn btn-operator" onclick="appendToDisplay('+')">
          +
        </button>

        <!-- Row 5 -->
        <button class="btn" onclick="appendToDisplay('4')">4</button>
        <button class="btn" onclick="appendToDisplay('5')">5</button>
        <button class="btn" onclick="appendToDisplay('6')">6</button>
        <button class="btn btn-function" onclick="appendToDisplay('2.71828')">
          e
        </button>
        <button class="btn btn-function" onclick="appendFunction('factorial(')">
          n!
        </button>

        <!-- Row 6 -->
        <button class="btn" onclick="appendToDisplay('1')">1</button>
        <button class="btn" onclick="appendToDisplay('2')">2</button>
        <button class="btn" onclick="appendToDisplay('3')">3</button>
        <button class="btn" onclick="appendToDisplay('(')">(</button>
        <button class="btn" onclick="appendToDisplay(')')">)</button>

        <!-- Row 7 -->
        <button class="btn two-column" onclick="appendToDisplay('0')">0</button>
        <button class="btn" onclick="appendToDisplay('.')">.</button>
        <button class="btn btn-equals two-column" onclick="calculate()">
          =
        </button>
      </div>

      <div class="history">
        <div class="history-title">History</div>
        <div id="history-content"></div>
      </div>
    </div>

    <script src="static/script.js" defer></script>
  </body>
</html>
